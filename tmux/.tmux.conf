set-option -ga terminal-overrides ',xterm-256color:RGB'

set-option -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
# increase scroll-back history
# set -g history-limit 10000

# use vim key bindings
setw -g mode-keys vi
set-option -g mouse on

# decrease command delay (increases vim responsiveness)
set -sg escape-time 1

# increase repeat time for repeatable commands
set -g repeat-time 1000

# start window index at 1
set -g base-index 1

# start pane index at 1
setw -g pane-base-index 1

# automatically renumber windows when one is closed
set -g renumber-windows on

# highlight window when it has new activity
setw -g monitor-activity on
set -g visual-activity on

###########################
#  Key Bindings
###########################

# tmux prefix
unbind C-b
set -g prefix C-j

# copy with 'enter' or 'y' and send to mac os clipboard: http://goo.gl/2Bfn8

# create 'v' alias for selecting text
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-selection
#bind-key -Tcopy-mode-vi 'y' send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -Tcopy-mode-vi Escape send -X cancel
bind-key -Tcopy-mode-vi V send -X rectangle-toggle
# paste
unbind C-p
bind C-p paste-buffer

# windows back
unbind C-p
unbind C-b
bind Tab previous-window
# mở popup terminal 80x20, ở giữa
bind f display-popup -E -w 80% -h 80% -T "Floating"
# window splitting
unbind %
bind | split-window -h -c '#{pane_current_path}'
unbind '"'
bind - split-window -v

bind -r < swap-window -t :-1 \; select-window -t :-1
bind -r > swap-window -t :+1 \; select-window -t :+1

# prompt for a target index to swap with
bind S command-prompt -p "swap with window index:" "swap-window -t '%%'; select-window -t '%%'"

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# create 25% lower split
unbind t
bind t split-window -p 25

# quickly switch panes
unbind ^J
bind ^J select-pane -t :.+

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# override ctrl+k to do nothing (prevent terminal clearing)
unbind C-k
bind C-k send-keys ''

###########################
# Status Bar
###########################

# enable UTF-8 support in status bar

# set refresh interval for status bar
set -g status-interval 30

# center the status bar
set -g status-justify left

# show session, window, pane in left status bar
set -g status-left-length 40

set -g status-left '#[fg=#a6e3a1]#S#[fg=#89b4fa] #I:#P#[default]'
#### COLOUR (Solarized 256)

# ----------------------------=== Theme ===--------------------------

# status
set -g status-position bottom
set -g status "on"
set -g status-style bg=colour235,fg=colour136,default
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# messages
set -g message-style bg=colour235,fg=colour166
set -g message-command-style bg=colour235,fg=colour166

# panes
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour136,bg=colour235

# pane number display
set -g display-panes-active-colour colour33
set -g display-panes-colour colour166

# clock
set-window-option -g clock-mode-colour colour64

# windows
setw -g window-status-activity-style none
setw -g window-status-separator ""
setw -g window-status-style fg=colour244,bg=colour234,dim

# show hostname and shortened current path in right status bar (max 3 levels)
set-option -g status-right '#[fg=colour64]#H#[default] #[fg=colour33]#(echo "#{pane_current_path}" | sed "s|$HOME|~|" | awk -F/ "{if(NF>3) printf \"../\" substr(\$(NF-2),1,1) \"/\" substr(\$(NF-1),1,1) \"/\" \$NF; else print \$0}")#[default]'

# --------=== Powerline Statusline
set -g status-left '#[bg=#1e1e2e,fg=#f9e2af,bold]  #S  #[default]'

# Window tabs - show [current_folder] process
setw -g window-status-format "#[bg=colour237,fg=colour255] [#I]#(basename #{pane_current_path})/#{pane_current_command} #[default]"
setw -g window-status-current-format "#[bg=#11111b,fg=#f5e0dc,bold] [#I]#[fg=#f5e0dc]#(basename #{pane_current_path})#[fg=#f5e0dc]/#{pane_current_command} #[default]"
